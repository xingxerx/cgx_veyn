# VEYN Semantic Synthesis Rules
# Hot-reloaded every 30 s — no daemon restart required.
#
# Rules are evaluated in order; the first matching rule wins.
# If no rule matches, intent defaults to "neutral" with confidence 0.5.
#
# Condition operators: "above" | "below" | "equals"
# All conditions in a rule are AND'd together — any number of signals can be
# combined to express multi-signal fusion (e.g. HR + HRV + EEG beta).
#
# intent_code values: "neutral" | "cognitive_load" | "stress_response" |
#   "approach" | "avoidance" | "fatigue" | "recovery" | any custom string

# ── Multi-signal biometric + EEG rules (highest specificity first) ────────────

[[rules]]
name        = "stress_eeg_confirmed"
intent      = "stress response confirmed by biometric and EEG beta elevation"
intent_code = "stress_response"
confidence  = 0.92
[[rules.conditions]]
metric    = "heart_rate"
op        = "above"
threshold = 100.0
[[rules.conditions]]
metric    = "hrv"
op        = "below"
threshold = 30.0
[[rules.conditions]]
metric    = "eeg_beta"
op        = "above"
threshold = 0.6

[[rules]]
name        = "cognitive_load_eeg_confirmed"
intent      = "cognitive load confirmed by elevated EEG beta and theta with HR/HRV shift"
intent_code = "cognitive_load"
confidence  = 0.89
[[rules.conditions]]
metric    = "heart_rate"
op        = "above"
threshold = 72.0
[[rules.conditions]]
metric    = "hrv"
op        = "below"
threshold = 50.0
[[rules.conditions]]
metric    = "eeg_beta"
op        = "above"
threshold = 0.5
[[rules.conditions]]
metric    = "eeg_theta"
op        = "above"
threshold = 0.4

[[rules]]
name        = "deep_focus_eeg"
intent      = "deep focus — low HR, high HRV, and elevated EEG alpha wave"
intent_code = "cognitive_load"
confidence  = 0.91
[[rules.conditions]]
metric    = "heart_rate"
op        = "below"
threshold = 65.0
[[rules.conditions]]
metric    = "hrv"
op        = "above"
threshold = 55.0
[[rules.conditions]]
metric    = "eeg_alpha"
op        = "below"
threshold = 0.3

[[rules]]
name        = "fatigue_eeg_confirmed"
intent      = "fatigue confirmed by depressed HR, HRV, and EEG beta with elevated alpha"
intent_code = "fatigue"
confidence  = 0.88
[[rules.conditions]]
metric    = "heart_rate"
op        = "below"
threshold = 58.0
[[rules.conditions]]
metric    = "hrv"
op        = "below"
threshold = 35.0
[[rules.conditions]]
metric    = "eeg_alpha"
op        = "above"
threshold = 0.7

[[rules]]
name        = "recovery_eeg_confirmed"
intent      = "post-exertion recovery confirmed by stabilising HR, rising HRV and elevated EEG alpha"
intent_code = "recovery"
confidence  = 0.86
[[rules.conditions]]
metric    = "heart_rate"
op        = "above"
threshold = 65.0
[[rules.conditions]]
metric    = "hrv"
op        = "above"
threshold = 45.0
[[rules.conditions]]
metric    = "eeg_alpha"
op        = "above"
threshold = 0.5

# ── Two-signal biometric rules ────────────────────────────────────────────────

[[rules]]
name        = "physical_stress"
intent      = "user under physical stress"
intent_code = "stress_response"
confidence  = 0.85
[[rules.conditions]]
metric    = "heart_rate"
op        = "above"
threshold = 100.0

[[rules]]
name        = "deep_focus_calm"
intent      = "user in deep focus or calm state"
intent_code = "cognitive_load"
confidence  = 0.88
[[rules.conditions]]
metric    = "heart_rate"
op        = "below"
threshold = 60.0
[[rules.conditions]]
metric    = "hrv"
op        = "above"
threshold = 50.0

[[rules]]
name        = "resting"
intent      = "user resting or sleeping"
intent_code = "fatigue"
confidence  = 0.80
[[rules.conditions]]
metric    = "heart_rate"
op        = "below"
threshold = 55.0

[[rules]]
name        = "recovery"
intent      = "user in post-exertion recovery"
intent_code = "recovery"
confidence  = 0.78
[[rules.conditions]]
metric    = "heart_rate"
op        = "above"
threshold = 65.0
[[rules.conditions]]
metric    = "hrv"
op        = "above"
threshold = 40.0

[[rules]]
name        = "moderate_activity"
intent      = "user in moderate physical activity"
intent_code = "approach"
confidence  = 0.75
[[rules.conditions]]
metric    = "steps"
op        = "above"
threshold = 50.0

[[rules]]
name        = "low_blood_oxygen"
intent      = "user showing low blood oxygen — possible health concern"
intent_code = "stress_response"
confidence  = 0.90
[[rules.conditions]]
metric    = "spo2"
op        = "below"
threshold = 92.0

[[rules]]
name        = "normal_activity"
intent      = "user in normal activity state"
intent_code = "approach"
confidence  = 0.70
[[rules.conditions]]
metric    = "heart_rate"
op        = "above"
threshold = 60.0

# ── MIDI rules ─────────────────────────────────────────────────────────────────

[[rules]]
name        = "midi_active_performance"
intent      = "user actively performing — MIDI note stream detected"
intent_code = "approach"
confidence  = 0.80
[[rules.conditions]]
metric    = "midi_note_on"
op        = "above"
threshold = 0.0

[[rules]]
name        = "midi_modulation_high"
intent      = "user expression elevated via MIDI modulation wheel"
intent_code = "approach"
confidence  = 0.72
[[rules.conditions]]
metric    = "midi_cc_1"
op        = "above"
threshold = 80.0

# ── Filesystem / environment rules ────────────────────────────────────────────

[[rules]]
name        = "fs_activity"
intent      = "filesystem activity detected in watched directory"
intent_code = "approach"
confidence  = 0.65
[[rules.conditions]]
metric    = "fs_event"
op        = "above"
threshold = 0.5

# ── HID / keyboard rules ──────────────────────────────────────────────────────

[[rules]]
name        = "keyboard_activity"
intent      = "user actively typing — keyboard input detected"
intent_code = "approach"
confidence  = 0.70
[[rules.conditions]]
metric    = "key_event"
op        = "above"
threshold = 0.5

# ── MQTT / smart-home rules ───────────────────────────────────────────────────

[[rules]]
name        = "environment_idle"
intent      = "environment idle — no occupancy or activity signals"
intent_code = "neutral"
confidence  = 0.68
[[rules.conditions]]
metric    = "occupancy"
op        = "below"
threshold = 0.5

# ── 15.1: MQTT Intent-to-Action output rules ─────────────────────────────────
# These fire when the intent_code transitions.  Each rule publishes the given
# payload to the MQTT topic.  `debounce_ms` prevents repeated fires.
# Requires `[mqtt] url = "mqtt://..."` in veyn.toml.

[[mqtt_output]]
intent_code = "stress_response"
topic       = "homeassistant/scene/activate"
payload     = '{"scene": "calm", "transition": 5}'
debounce_ms = 30000

[[mqtt_output]]
intent_code = "fatigue"
topic       = "homeassistant/scene/activate"
payload     = '{"scene": "wind_down", "transition": 10}'
debounce_ms = 60000

[[mqtt_output]]
intent_code = "cognitive_load"
topic       = "homeassistant/scene/activate"
payload     = '{"scene": "focus", "transition": 3}'
debounce_ms = 30000

[[mqtt_output]]
intent_code = "recovery"
topic       = "homeassistant/scene/activate"
payload     = '{"scene": "energize", "transition": 5}'
debounce_ms = 45000

[[mqtt_output]]
intent_code = "approach"
topic       = "homeassistant/light/office/brightness"
payload     = '{"brightness": 255}'
debounce_ms = 15000

